name: PR Preview

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".gitignore"
      - ".editorconfig"
      - "LICENSE"

concurrency:
  group: preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    name: Build example & post preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build example site
        run: bun run build:example

      - name: Upload example/dist as artifact
        id: artifact
        uses: actions/upload-artifact@v7
        with:
          name: example-dist-pr-${{ github.event.pull_request.number }}
          path: example/dist
          if-no-files-found: error
          retention-days: 14

      - name: Detect Cloudflare Pages credentials
        id: cf_creds
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [[ "$IS_FORK" == "true" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Fork PR: secrets unavailable, skipping Cloudflare Pages deploy."
          elif [[ -n "$CF_TOKEN" && -n "$CF_ACCOUNT" && -n "$CF_PROJECT" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare Pages credentials not configured."
          fi

      - name: Deploy preview to Cloudflare Pages
        id: cf_deploy
        if: steps.cf_creds.outputs.available == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          directory: example/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: pr-${{ github.event.pull_request.number }}

      - name: Detect Netlify credentials
        id: nl_creds
        if: steps.cf_creds.outputs.available != 'true'
        env:
          NL_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NL_SITE: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [[ "$IS_FORK" == "true" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Fork PR: secrets unavailable, skipping Netlify deploy."
          elif [[ -n "$NL_TOKEN" && -n "$NL_SITE" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Netlify credentials not configured."
          fi

      - name: Deploy preview to Netlify
        id: nl_deploy
        if: steps.nl_creds.outputs.available == 'true'
        uses: nwtgck/actions-netlify@v4.0
        with:
          publish-dir: example/dist
          deploy-message: "Preview for PR #${{ github.event.pull_request.number }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          alias: deploy-preview-${{ github.event.pull_request.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Compose preview comment body
        id: body
        env:
          CF_URL: ${{ steps.cf_deploy.outputs.url }}
          NL_URL: ${{ steps.nl_deploy.outputs.deploy-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact-id }}
        run: |
          {
            echo "body<<PREVIEW_EOF"
            echo "## Laurel PR preview"
            echo ""
            echo "Built \`example/\` from commit \`${PR_HEAD_SHA:0:7}\`."
            echo ""
            if [[ -n "$CF_URL" ]]; then
              echo "- **Cloudflare Pages:** $CF_URL"
            fi
            if [[ -n "$NL_URL" ]]; then
              echo "- **Netlify:** $NL_URL"
            fi
            if [[ -z "$CF_URL" && -z "$NL_URL" ]]; then
              echo "- **Hosted preview:** _not configured_ (set \`CLOUDFLARE_API_TOKEN\` + \`CLOUDFLARE_ACCOUNT_ID\` secrets and \`CLOUDFLARE_PAGES_PROJECT\` variable, or \`NETLIFY_AUTH_TOKEN\` + \`NETLIFY_SITE_ID\` secrets, to enable)"
            fi
            echo "- **Build artifact:** [\`example-dist-pr-${PR_NUMBER}\`]($RUN_URL) (downloadable for 14 days)"
            echo ""
            echo "_Preview updates automatically on every push to this PR._"
            echo "PREVIEW_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky preview comment
        if: env.IS_FORK == 'false'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: laurel-pr-preview
          message: ${{ steps.body.outputs.body }}
