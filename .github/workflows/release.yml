name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0). Must already exist on the repo.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  resolve-ref:
    name: Resolve release tag
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      ref: ${{ steps.tag.outputs.ref }}
    steps:
      - name: Compute tag and ref
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$tag" ]]; then
            echo "No tag resolved" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/${tag}" >> "$GITHUB_OUTPUT"

  verify:
    name: verify (check / typecheck / test)
    needs: resolve-ref
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (lint + format)
        run: bun run check

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

  build:
    name: build (${{ matrix.artifact }})
    needs: [resolve-ref, verify]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # id-token: write is required for SLSA build provenance attestation via
    # actions/attest-build-provenance. attestations: write is required to
    # publish the attestation to the repo's attestations registry. See #512.
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: nectar-linux-x64
          - target: bun-linux-arm64
            artifact: nectar-linux-arm64
          - target: bun-darwin-x64
            artifact: nectar-darwin-x64
          - target: bun-darwin-arm64
            artifact: nectar-darwin-arm64
          - target: bun-windows-x64
            artifact: nectar-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: |
          mkdir -p dist-bin
          bun build \
            --compile \
            --minify \
            --sourcemap \
            --target=${{ matrix.target }} \
            --outfile=dist-bin/${{ matrix.artifact }} \
            src/cli/index.ts

      # SLSA build provenance attestation (#512).
      # Produces a signed, Sigstore-backed statement that this exact binary
      # was built by this workflow run from this commit. Consumers can verify
      # with `gh attestation verify <binary> --repo t09tanaka/nectar`. The
      # attestation is stored in the GitHub attestations registry, not the
      # release assets, so it survives even if the release is edited.
      - name: Attest binary build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist-bin/${{ matrix.artifact }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-bin/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release
    needs: [resolve-ref, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG_NAME: ${{ needs.resolve-ref.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries and generate SHASUMS256.txt
        run: |
          mkdir -p release
          find artifacts -type f -name 'nectar-*' -exec cp {} release/ \;
          cd release
          ls -la
          sha256sum nectar-* > SHASUMS256.txt
          cat SHASUMS256.txt

      # Signing (cosign / minisign) is intentionally out of scope for now.
      # When added, sign SHASUMS256.txt and upload alongside the binaries.
      # See https://docs.sigstore.dev/cosign/ and https://jedisct1.github.io/minisign/.

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${TAG_NAME#v}"
          have_notes=false
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              BEGIN { found = 0 }
              /^## / {
                if (found) exit
                if ($0 ~ "^## \\[?v?" ver "(\\]|[[:space:]]|$)") {
                  found = 1
                  next
                }
              }
              found { print }
            ' CHANGELOG.md > release_notes.md
            if [[ -s release_notes.md ]]; then
              have_notes=true
            fi
          fi
          echo "have_notes=${have_notes}" >> "$GITHUB_OUTPUT"

      - name: Append verification instructions to release notes
        if: steps.notes.outputs.have_notes == 'true'
        run: |
          {
            echo ""
            echo "## Verification"
            echo ""
            echo "Each release includes a \`SHASUMS256.txt\` listing SHA-256 hashes of every binary."
            echo "Download \`SHASUMS256.txt\` and the binary you want, then verify:"
            echo ""
            echo "\`\`\`sh"
            echo "shasum -a 256 -c SHASUMS256.txt --ignore-missing"
            echo "\`\`\`"
            echo ""
            echo "### Build provenance (SLSA / Sigstore)"
            echo ""
            echo "Every binary in this release is signed with a Sigstore build provenance"
            echo "attestation. To verify a binary was built by this workflow run from this"
            echo "commit, install the GitHub CLI and run:"
            echo ""
            echo "\`\`\`sh"
            echo "gh attestation verify <binary> --repo t09tanaka/nectar"
            echo "\`\`\`"
            echo ""
            echo "The npm package is published with \`--provenance\` and can be verified"
            echo "with \`npm audit signatures\`."
            echo ""
            echo "Signed checksums (cosign / minisign) are not yet provided. Track the work in #511."
          } >> release_notes.md

      - name: Create GitHub Release (with CHANGELOG notes)
        if: steps.notes.outputs.have_notes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release_notes.md \
            release/*

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.have_notes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            release/*

      - name: Append verification note via release edit (auto-generated path)
        if: steps.notes.outputs.have_notes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh release view "$TAG_NAME" --json body --jq '.body')
          {
            printf '%s\n' "$existing"
            echo ""
            echo "## Verification"
            echo ""
            echo "Each release includes a \`SHASUMS256.txt\` listing SHA-256 hashes of every binary."
            echo "Download \`SHASUMS256.txt\` and the binary you want, then verify:"
            echo ""
            echo "\`\`\`sh"
            echo "shasum -a 256 -c SHASUMS256.txt --ignore-missing"
            echo "\`\`\`"
            echo ""
            echo "### Build provenance (SLSA / Sigstore)"
            echo ""
            echo "Every binary in this release is signed with a Sigstore build provenance"
            echo "attestation. To verify a binary was built by this workflow run from this"
            echo "commit, install the GitHub CLI and run:"
            echo ""
            echo "\`\`\`sh"
            echo "gh attestation verify <binary> --repo t09tanaka/nectar"
            echo "\`\`\`"
            echo ""
            echo "The npm package is published with \`--provenance\` and can be verified"
            echo "with \`npm audit signatures\`."
            echo ""
            echo "Signed checksums (cosign / minisign) are not yet provided. Track the work in #511."
          } > combined_notes.md
          gh release edit "$TAG_NAME" --notes-file combined_notes.md

  publish-npm:
    name: Publish to npm
    needs: [resolve-ref, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Node.js (for npm publish + provenance)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build distribution
        run: |
          bun run build:cli
          bun run build:types

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
