name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0). Must already exist on the repo.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  resolve-ref:
    name: Resolve release tag
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      ref: ${{ steps.tag.outputs.ref }}
    steps:
      - name: Compute tag and ref
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$tag" ]]; then
            echo "No tag resolved" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/${tag}" >> "$GITHUB_OUTPUT"

  verify:
    name: verify (check / typecheck / test)
    needs: resolve-ref
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (lint + format)
        run: bun run check

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

  build:
    name: build (${{ matrix.artifact }})
    needs: [resolve-ref, verify]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    # id-token: write is required for SLSA build provenance attestation via
    # actions/attest-build-provenance. attestations: write is required to
    # publish the attestation to the repo's attestations registry. See #512.
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: nectar-linux-x64
            platform: linux
            runner: ubuntu-latest
          - target: bun-linux-arm64
            artifact: nectar-linux-arm64
            platform: linux
            runner: ubuntu-latest
          - target: bun-darwin-x64
            artifact: nectar-darwin-x64
            platform: darwin
            runner: macos-14
          - target: bun-darwin-arm64
            artifact: nectar-darwin-arm64
            platform: darwin
            runner: macos-14
          - target: bun-windows-x64
            artifact: nectar-windows-x64.exe
            platform: windows
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build embedded dashboard assets
        run: bun run build:dashboard-bundle

      - name: Compile standalone binary
        shell: bash
        run: |
          mkdir -p dist-bin
          bun build \
            --compile \
            --minify \
            --sourcemap \
            --target=${{ matrix.target }} \
            --outfile=dist-bin/${{ matrix.artifact }} \
            src/cli/index.ts

      - name: Sign and notarize macOS binary
        if: matrix.platform == 'darwin'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            APPLE_DEVELOPER_ID_CERT_BASE64
            APPLE_DEVELOPER_ID_CERT_PASSWORD
            APPLE_TEAM_ID
            APPLE_NOTARYTOOL_APPLE_ID
            APPLE_NOTARYTOOL_PASSWORD
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required macOS signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          cert_path="$RUNNER_TEMP/apple-developer-id.p12"
          keychain_path="$RUNNER_TEMP/nectar-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          notary_zip="$RUNNER_TEMP/${{ matrix.artifact }}.zip"
          cleanup() {
            security delete-keychain "$keychain_path" >/dev/null 2>&1 || true
            rm -f "$cert_path" "$notary_zip"
          }
          trap cleanup EXIT

          printf '%s' "$APPLE_DEVELOPER_ID_CERT_BASE64" | /usr/bin/base64 -D > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$identity" ]]; then
            echo "No Developer ID Application signing identity found in APPLE_DEVELOPER_ID_CERT_BASE64" >&2
            exit 1
          fi

          codesign --force --options runtime --timestamp --sign "$identity" "dist-bin/${{ matrix.artifact }}"
          codesign --verify --strict --verbose=2 "dist-bin/${{ matrix.artifact }}"

          ditto -c -k --keepParent "dist-bin/${{ matrix.artifact }}" "$notary_zip"
          xcrun notarytool submit "$notary_zip" \
            --apple-id "$APPLE_NOTARYTOOL_APPLE_ID" \
            --password "$APPLE_NOTARYTOOL_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Sign Windows binary
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |
          $ErrorActionPreference = "Stop"

          $required = @(
            "WINDOWS_SIGNING_CERT_BASE64",
            "WINDOWS_SIGNING_CERT_PASSWORD"
          )
          $missing = @()
          foreach ($name in $required) {
            $value = [Environment]::GetEnvironmentVariable($name)
            if ([string]::IsNullOrWhiteSpace($value)) {
              $missing += $name
            }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required Windows signing secrets: $($missing -join ', ')"
            exit 1
          }

          $cert = $null
          $pfxPath = Join-Path $env:RUNNER_TEMP "nectar-windows-signing.pfx"
          try {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
            $securePassword = ConvertTo-SecureString $env:WINDOWS_SIGNING_CERT_PASSWORD -AsPlainText -Force
            $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
            if (-not $cert) {
              Write-Error "Failed to import WINDOWS_SIGNING_CERT_BASE64"
              exit 1
            }

            $timestampUrl = $env:WINDOWS_SIGNING_TIMESTAMP_URL
            if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
              $timestampUrl = "http://timestamp.digicert.com"
            }

            $binary = "dist-bin/${{ matrix.artifact }}"
            $signature = Set-AuthenticodeSignature -FilePath $binary -Certificate $cert -TimestampServer $timestampUrl -HashAlgorithm SHA256
            $signature | Format-List
            if ($signature.Status -ne "Valid") {
              Write-Error "Authenticode signing failed with status $($signature.Status): $($signature.StatusMessage)"
              exit 1
            }

            $verification = Get-AuthenticodeSignature -FilePath $binary
            if ($verification.Status -ne "Valid") {
              Write-Error "Authenticode verification failed with status $($verification.Status): $($verification.StatusMessage)"
              exit 1
            }
          } finally {
            if ($cert) {
              Remove-Item -Path "Cert:\CurrentUser\My\$($cert.Thumbprint)" -Force -ErrorAction SilentlyContinue
            }
            Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue
          }

      # SLSA build provenance attestation (#512).
      # Produces a signed, Sigstore-backed statement that this exact binary
      # was built by this workflow run from this commit. Consumers can verify
      # with `gh attestation verify <binary> --repo t09tanaka/nectar`. The
      # attestation is stored in the GitHub attestations registry, not the
      # release assets, so it survives even if the release is edited.
      - name: Attest binary build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist-bin/${{ matrix.artifact }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist-bin/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release
    needs: [resolve-ref, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TAG_NAME: ${{ needs.resolve-ref.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect binaries and generate SHASUMS256.txt
        run: |
          mkdir -p release
          find artifacts -type f -name 'nectar-*' -exec cp {} release/ \;
          cd release
          ls -la
          sha256sum nectar-* > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Generate Homebrew formula
        run: |
          bun run scripts/generate-homebrew-formula.ts \
            --version "$TAG_NAME" \
            --shasums release/SHASUMS256.txt \
            --output release/nectar.rb
          ruby -c release/nectar.rb

      - name: Generate Scoop manifest
        run: |
          bun run scripts/generate-scoop-manifest.ts \
            --version "$TAG_NAME" \
            --shasums release/SHASUMS256.txt \
            --output release/nectar.json
          bun -e 'JSON.parse(await Bun.file("release/nectar.json").text())'

      - name: Generate CycloneDX SBOM
        run: |
          bun run sbom:cyclonedx
          cp dist-sbom/nectar.cyclonedx.json release/nectar.cyclonedx.json
          bun -e 'const bom = JSON.parse(await Bun.file("release/nectar.cyclonedx.json").text()); if (bom.bomFormat !== "CycloneDX") throw new Error("invalid CycloneDX SBOM");'

      # Signed checksums (cosign / minisign) are intentionally out of scope for now.
      # Platform binaries are signed in the build job before upload.

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${TAG_NAME#v}"
          have_notes=false
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              BEGIN { found = 0 }
              /^## / {
                if (found) exit
                if ($0 ~ "^## \\[?v?" ver "(\\]|[[:space:]]|$)") {
                  found = 1
                  next
                }
              }
              found { print }
            ' CHANGELOG.md > release_notes.md
            if [[ -s release_notes.md ]]; then
              have_notes=true
            fi
          fi
          echo "have_notes=${have_notes}" >> "$GITHUB_OUTPUT"

      - name: Append verification instructions to release notes
        if: steps.notes.outputs.have_notes == 'true'
        run: |
          {
            echo ""
            echo "## Verification"
            echo ""
            echo "Each release includes a \`SHASUMS256.txt\` listing SHA-256 hashes of every binary."
            echo "The \`nectar.cyclonedx.json\` asset is a CycloneDX SBOM generated from the locked Bun dependency graph."
            echo "Download \`SHASUMS256.txt\` and the binary you want, then verify:"
            echo ""
            echo "\`\`\`sh"
            echo "shasum -a 256 -c SHASUMS256.txt --ignore-missing"
            echo "\`\`\`"
            echo ""
            echo "### Build provenance (SLSA / Sigstore)"
            echo ""
            echo "Every binary in this release is signed with a Sigstore build provenance"
            echo "attestation. To verify a binary was built by this workflow run from this"
            echo "commit, install the GitHub CLI and run:"
            echo ""
            echo "\`\`\`sh"
            echo "gh attestation verify <binary> --repo t09tanaka/nectar"
            echo "\`\`\`"
            echo ""
            echo "Public npm releases use \`npm publish --provenance\` and can be verified"
            echo "with \`npm audit signatures\`."
            echo ""
            echo "### Platform code signatures"
            echo ""
            echo "macOS binaries are signed with an Apple Developer ID Application"
            echo "certificate and submitted to Apple notarization before upload."
            echo "The Windows binary is signed with Authenticode and a trusted"
            echo "timestamp. Linux binaries are covered by checksums and build provenance."
            echo ""
            echo "Signed checksums (cosign / minisign) are not yet provided. Track the work in #511."
          } >> release_notes.md

      - name: Create GitHub Release (with CHANGELOG notes)
        if: steps.notes.outputs.have_notes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release_notes.md \
            release/*

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.have_notes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            release/*

      - name: Append verification note via release edit (auto-generated path)
        if: steps.notes.outputs.have_notes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh release view "$TAG_NAME" --json body --jq '.body')
          {
            printf '%s\n' "$existing"
            echo ""
            echo "## Verification"
            echo ""
            echo "Each release includes a \`SHASUMS256.txt\` listing SHA-256 hashes of every binary."
            echo "The \`nectar.cyclonedx.json\` asset is a CycloneDX SBOM generated from the locked Bun dependency graph."
            echo "Download \`SHASUMS256.txt\` and the binary you want, then verify:"
            echo ""
            echo "\`\`\`sh"
            echo "shasum -a 256 -c SHASUMS256.txt --ignore-missing"
            echo "\`\`\`"
            echo ""
            echo "### Build provenance (SLSA / Sigstore)"
            echo ""
            echo "Every binary in this release is signed with a Sigstore build provenance"
            echo "attestation. To verify a binary was built by this workflow run from this"
            echo "commit, install the GitHub CLI and run:"
            echo ""
            echo "\`\`\`sh"
            echo "gh attestation verify <binary> --repo t09tanaka/nectar"
            echo "\`\`\`"
            echo ""
            echo "Public npm releases use \`npm publish --provenance\` and can be verified"
            echo "with \`npm audit signatures\`."
            echo ""
            echo "### Platform code signatures"
            echo ""
            echo "macOS binaries are signed with an Apple Developer ID Application"
            echo "certificate and submitted to Apple notarization before upload."
            echo "The Windows binary is signed with Authenticode and a trusted"
            echo "timestamp. Linux binaries are covered by checksums and build provenance."
            echo ""
            echo "Signed checksums (cosign / minisign) are not yet provided. Track the work in #511."
          } > combined_notes.md
          gh release edit "$TAG_NAME" --notes-file combined_notes.md

  bump-homebrew-tap:
    name: Bump Homebrew tap
    needs: [resolve-ref, release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      TAG_NAME: ${{ needs.resolve-ref.outputs.tag }}
      HOMEBREW_TAP_REPOSITORY: t09tanaka/homebrew-nectar
    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}
          path: nectar

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          brew-gh-api-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-nectar

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p nectar/release-tap
          gh release download "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern SHASUMS256.txt \
            --dir nectar/release-tap \
            --clobber

      - name: Generate tap formula
        run: |
          cd nectar
          bun run scripts/generate-homebrew-formula.ts \
            --version "$TAG_NAME" \
            --shasums release-tap/SHASUMS256.txt \
            --output ../homebrew-nectar/Formula/nectar.rb

      - name: Validate tap formula
        run: |
          cd homebrew-nectar
          ruby -c Formula/nectar.rb
          brew audit --strict --online --formula Formula/nectar.rb

      - name: Open tap bump pull request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          cd homebrew-nectar

          if git diff --quiet -- Formula/nectar.rb; then
            echo "Homebrew tap formula already matches ${TAG_NAME}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="nectar-${TAG_NAME}"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git checkout -B "$branch"
          git add Formula/nectar.rb
          git commit -m "nectar ${TAG_NAME#v}"
          git push --force-with-lease origin "$branch"

          existing_pr="$(gh pr list \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --head "$branch" \
            --json number \
            --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            echo "Homebrew tap PR #${existing_pr} already exists."
            exit 0
          fi

          gh pr create \
            --repo "$HOMEBREW_TAP_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "nectar ${TAG_NAME#v}" \
            --body "Bumps the Nectar Homebrew formula to ${TAG_NAME} using the signed Darwin and Linux binaries from the GitHub Release."

  publish-docker:
    name: Publish Docker image
    needs: [resolve-ref, release]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Validate Docker Hub secrets
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required to publish the Docker Hub image." >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nectar
          tags: |
            type=raw,value=${{ needs.resolve-ref.outputs.tag }}
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.resolve-ref.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-ref.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.resolve-ref.outputs.tag }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.resolve-ref.outputs.tag }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  publish-npm:
    name: Publish to npm
    needs: [resolve-ref, release]
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Node.js (for npm publish + provenance)
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build distribution
        run: |
          bun run build:dashboard-bundle
          bun run build:cli
          bun run build:types

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
