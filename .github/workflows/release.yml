name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify (check / typecheck / test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (lint + format)
        run: bun run check

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

  build:
    name: build (${{ matrix.artifact }})
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: nectar-linux-x64
          - target: bun-linux-arm64
            artifact: nectar-linux-arm64
          - target: bun-darwin-x64
            artifact: nectar-darwin-x64
          - target: bun-darwin-arm64
            artifact: nectar-darwin-arm64
          - target: bun-windows-x64
            artifact: nectar-windows-x64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binary
        run: |
          mkdir -p dist-bin
          bun build \
            --compile \
            --minify \
            --sourcemap \
            --target=${{ matrix.target }} \
            --outfile=dist-bin/${{ matrix.artifact }} \
            src/cli/index.ts

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-bin/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries and generate SHASUMS256.txt
        run: |
          mkdir -p release
          find artifacts -type f -name 'nectar-*' -exec cp {} release/ \;
          cd release
          ls -la
          sha256sum nectar-* > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          have_notes=false
          if [[ -f CHANGELOG.md ]]; then
            awk -v ver="$VERSION" '
              BEGIN { found = 0 }
              /^## / {
                if (found) exit
                if ($0 ~ "^## \\[?v?" ver "(\\]|[[:space:]]|$)") {
                  found = 1
                  next
                }
              }
              found { print }
            ' CHANGELOG.md > release_notes.md
            if [[ -s release_notes.md ]]; then
              have_notes=true
            fi
          fi
          echo "have_notes=${have_notes}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ steps.notes.outputs.have_notes }}" == "true" ]]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release_notes.md \
              release/*
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              release/*
          fi

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Node.js (for npm publish + provenance)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build distribution
        run: |
          bun run build:cli
          bun run build:types

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
