name: Theme Fixture Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: theme-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: ${{ matrix.theme }} smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - theme: casper
            repo: TryGhost/Casper
          - theme: headline
            repo: TryGhost/Headline
          - theme: edition
            repo: TryGhost/Edition
          - theme: wave
            repo: TryGhost/Wave
          - theme: liebling
            repo: TryGhost/Liebling
    steps:
      - name: Checkout nectar
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download theme ${{ matrix.theme }}
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          path: .theme-cache/${{ matrix.theme }}

      - name: Smoke build ${{ matrix.theme }}
        run: bun tests/fixtures/theme-smoke/run.ts --theme-name ${{ matrix.theme }} --theme-path .theme-cache/${{ matrix.theme }}
