name: Theme Fixture Smoke

# Manual-only: these smoke builds clone external TryGhost theme repos at run
# time, so they fail whenever a repo is renamed/removed or the network/API is
# flaky (e.g. `TryGhost/Liebling` 404s). Keeping them off `push`/`pull_request`
# stops that external dependency from gating CI. Run on demand via the Actions
# tab when validating theme compatibility.
on:
  workflow_dispatch:

concurrency:
  group: theme-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    name: ${{ matrix.theme }} smoke build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - theme: casper
            repo: TryGhost/Casper
          - theme: headline
            repo: TryGhost/Headline
          - theme: edition
            repo: TryGhost/Edition
          - theme: wave
            repo: TryGhost/Wave
          # liebling removed: `TryGhost/Liebling` does not exist (the theme is
          # third-party), so the checkout step 404s and fails the matrix leg.
    steps:
      - name: Checkout laurel
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download theme ${{ matrix.theme }}
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repo }}
          path: .theme-cache/${{ matrix.theme }}

      - name: Smoke build ${{ matrix.theme }}
        run: bun tests/fixtures/theme-smoke/run.ts --theme-name ${{ matrix.theme }} --theme-path .theme-cache/${{ matrix.theme }}
