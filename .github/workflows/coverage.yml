name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  coverage:
    name: bun test --coverage → Codecov
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-latest-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Emit both the text table (visible in the CI log) and the lcov file
      # that downstream steps (Codecov upload, artifact, coverage-gate) read.
      # bunfig.toml [test] already pins coverageReporter / coverageDir but we
      # repeat them on the CLI for clarity — what runs in CI is identical to
      # `bun run test:coverage` locally.
      - name: Run tests with coverage (text + lcov)
        # Match the sharded `bun run test` timeout (30s). The default 5s is too
        # tight here: coverage instrumentation slows the subprocess-spawning CLI
        # snapshot tests past 5s, flaking the run.
        run: bun test --timeout=30000 --coverage --coverage-reporter=text --coverage-reporter=lcov --coverage-dir=coverage

      # Enforce a hard aggregate floor on line + function coverage (#665).
      # The gate parses coverage/lcov.info and exits non-zero when either
      # falls below the thresholds configured in scripts/coverage-gate.ts
      # (default 85%). Thresholds live there instead of bunfig so the project
      # can keep explicit aggregate semantics and child-process CLI exclusions.
      - name: Enforce coverage threshold
        run: bun scripts/coverage-gate.ts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: laurel-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14
