name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  coverage:
    name: bun test --coverage → Codecov
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-latest-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Emit both the text table (visible in the CI log) and the lcov file
      # that downstream steps (Codecov upload, artifact, coverage-gate) read.
      # bunfig.toml [test] already pins coverageReporter / coverageDir but we
      # repeat them on the CLI for clarity — what runs in CI is identical to
      # `bun run test:coverage` locally.
      - name: Run tests with coverage (text + lcov)
        run: bun test --coverage --coverage-reporter=text --coverage-reporter=lcov --coverage-dir=coverage

      # Enforce a hard floor on line + function coverage (#665). The gate
      # parses coverage/lcov.info and exits non-zero when either falls below
      # the threshold configured in scripts/coverage-gate.ts (default 85%).
      # This is a separate step from `bun test --coverage` because Bun 1.3.x
      # does not yet honour [test.coverageThreshold] in its own exit code.
      - name: Enforce coverage threshold
        run: bun scripts/coverage-gate.ts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: nectar-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14
