name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC sweep so dormant branches still get rescanned
    # against the latest advisory feeds (osv-scanner, CodeQL DB updates).
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan historical commits, not just
          # the tip. Secrets that landed in old commits still need to be
          # caught and rotated.
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  osv-scanner:
    name: osv-scanner (lockfile vulnerabilities)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.2
        with:
          scan-args: |-
            --lockfile=bun.lock
            --recursive
            --skip-git
            ./

  bun-audit:
    name: bun audit (lockfile integrity + advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # --frozen-lockfile fails the build if bun.lock and package.json drift,
      # which also forces Bun to verify each tarball hash against the lockfile.
      # This catches a tampered registry response or a stale, hand-edited lock
      # before the rest of the pipeline runs against poisoned dependencies.
      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      # bun-native advisory check, layered on top of osv-scanner so a CVE that
      # only one feed knows about still surfaces. high/critical fail the job;
      # lower severities print but do not block, matching how renovate PRs are
      # triaged.
      - name: bun audit (high+ severities fail the job)
        run: bun audit --audit-level=high

  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
