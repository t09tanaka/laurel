name: Markdown Links

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - "lychee.toml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - "lychee.toml"

concurrency:
  group: links-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lychee:
    name: lychee link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress --cache --max-cache-age 7d './**/*.md'
          fail: true
