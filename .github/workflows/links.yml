name: Markdown Links

# Manual-only: the repo's markdown carries pre-existing link debt (root-relative
# docs-site links lychee cannot resolve locally, plus external 403/404s), so
# running on every push/PR gates unrelated changes on that backlog. Re-enable the
# push/pull_request triggers once the link debt is cleared. Run on demand via the
# Actions tab in the meantime.
on:
  workflow_dispatch:

concurrency:
  group: links-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lychee:
    name: lychee link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress --cache --max-cache-age 7d './**/*.md'
          fail: true
