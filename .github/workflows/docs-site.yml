name: Docs Site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "example/themes/source/**"
      - "src/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs-site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Cache Bun install store
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.0-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build docs-site
        working-directory: docs-site
        # GitHub Pages serves the project under base_path (e.g. /laurel/) and
        # strips that prefix at the host, so the uploaded artifact must stay
        # flat in dist/. --no-emit-at-base-path opts out of the default
        # base_path disk nesting; without it the output would land in
        # dist/<base_path>/ and Pages would resolve /laurel/laurel/.
        run: bun ../src/cli/index.ts build --base-path "${{ steps.pages.outputs.base_path }}" --no-emit-at-base-path

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
