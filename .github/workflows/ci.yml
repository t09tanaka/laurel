name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: check / typecheck / test / build (${{ matrix.os }}, bun-${{ matrix.bun }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun: ["1.3.0", "latest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Verify Bun tsconfig path alias runtime resolution
        run: bun run verify:bun-path-alias

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ matrix.bun }}-node-modules-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check (lint + format)
        run: bun run check

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun test

      - name: Build example site
        run: bun run build:example

      - name: Theme bundle size gate (example/dist)
        run: bun run size:theme-bundle

      - name: html-validate (example/dist)
        run: bun run lint:html

      - name: axe a11y gate (example/dist)
        run: bun run lint:a11y

      - name: Lighthouse 100 gate (example/dist)
        if: matrix.os == 'ubuntu-latest' && matrix.bun == 'latest'
        run: bun run lint:lighthouse
