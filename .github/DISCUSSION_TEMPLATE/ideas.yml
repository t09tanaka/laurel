title: "[Idea] "
body:
  - type: markdown
    attributes:
      value: |
        Ideas is for proposing a feature or change before any code is written.
        If discussion converges on "yes, let's build this", a maintainer or
        you can open an issue to track the implementation.

        Before posting, please check whether your idea conflicts with the
        explicit non-goals in [`CLAUDE.md`](https://github.com/t09tanaka/laurel/blob/main/CLAUDE.md) (members, server-side search, live drafts, multi-locale routing, email-only posts). Those aren't up for revisiting via Ideas — they're scope decisions.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the proposed solution. "I'm
        deploying to Cloudflare Pages and want X" rather than "Laurel should
        do X".
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would Laurel do differently? Be concrete — config
        shape, CLI surface, helper signature, etc. — even if you're not sure
        it's the right design.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem. Includes the
        do-nothing option ("user keeps doing X by hand"). Helps reviewers
        weigh trade-offs.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Where do you think this lives?
      description: Your best guess — maintainers may correct it.
      options:
        - Core SSG (build pipeline, content loader, theme loader)
        - Ghost compatibility (helpers, contexts)
        - Optional component (search, RSS, sitemap, comments, OG images)
        - CLI / DX (commands, flags, error messages)
        - Migration tooling (Ghost / WordPress import)
        - Docs / examples / tutorials
        - Not sure
    validations:
      required: false
