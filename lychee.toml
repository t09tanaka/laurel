############################# lychee config ###################################
# https://github.com/lycheeverse/lychee
# Used by .github/workflows/links.yml to catch broken anchors and 404s in *.md.

# Exclude paths that are not first-party docs:
#  - node_modules: third-party
#  - example/themes/source: vendored Ghost theme; not ours to fix
#  - example/dist: build artifact
#  - .worktrees: local-only parallel work dirs
exclude_path = [
  "node_modules",
  "example/themes/source",
  "example/dist",
  ".worktrees",
]

# Network behavior
max_concurrency = 8
max_retries = 2
retry_wait_time = 2
timeout = 20

# 429 = rate-limited. Treat as transient, not a failure.
accept = ["100..=103", "200..=299", "429"]

# Skip link checking inside fenced code blocks and inline code.
include_verbatim = false

# Don't check mailto: links (the `exclude_mail` key was removed in lychee 0.18+).
include_mail = false

# Allowlist for hosts/URLs that are known to misbehave or are placeholders.
# example.com / example.org are RFC 2606 reserved names used in docs.
# The discussions/categories/* paths point at GitHub Discussions categories
# that exist as soon as Discussions is enabled on the repo; until the toggle
# is flipped they 404, so they're allowlisted to avoid flapping CI.
exclude = [
  "^https?://(?:[a-z0-9-]+\\.)*example\\.com(?:/|$)",
  "^https?://(?:[a-z0-9-]+\\.)*example\\.org(?:/|$)",
  "^https?://localhost(?::\\d+)?(?:/|$)",
  "^https?://127\\.0\\.0\\.1(?::\\d+)?(?:/|$)",
  "^https?://github\\.com/t09tanaka/laurel/discussions(?:/|$)",
  # oldblog.com is the placeholder source-site URL in import docs/help text; the
  # real domain serves a mismatched TLS cert, so it is not a checkable link.
  "^https?://(?:[a-z0-9-]+\\.)*oldblog\\.com(?:/|$)",
]
