[site]
title = "Laurel Example"
description = "A demo blog built with Laurel against the Ghost Casper theme"
url = "https://laurel.example.com"
locale = "en"
timezone = "UTC"
accent_color = "#D63F00"
logo = "/content/images/logo.svg"
icon = "/content/images/favicon.svg"
cover_image = "/content/images/welcome-cover.svg"
og_image = "/content/images/welcome-cover.svg"
twitter_image = "/content/images/welcome-cover.svg"

[theme]
name = "casper"
dir = "themes"

[theme.custom]
navigation_layout = "Logo on cover"
title_font = "Modern sans-serif"
body_font = "Elegant serif"
show_publication_cover = true
header_style = "Center aligned"
feed_layout = "Classic"
color_scheme = "Light"
post_image_style = "Wide"
email_signup_text = "Sign up for more like this."
show_recent_posts_footer = true

[content]
posts_dir = "content/posts"
pages_dir = "content/pages"
authors_dir = "content/authors"
tags_dir = "content/tags"
assets_dir = "content/images"

[build]
output_dir = "dist"
base_path = "/"
posts_per_page = 6
copy_content_assets = true
minify_html = true
precompress = true

[deploy.cloudflare_pages]
enabled = true

[deploy.early_hints]
enabled = true

[deploy.headers.security]
frame_options = "DENY"
strict_transport_security = "max-age=63072000; includeSubDomains; preload"
permissions_policy = "camera=(), microphone=(), geolocation=(), payment=()"
cross_origin_opener_policy = "same-origin"

[[navigation]]
label = "Home"
url = "/"

[[navigation]]
label = "About"
url = "/about/"

[[navigation]]
label = "Tags"
url = "/tag/news/"

[[secondary_navigation]]
label = "RSS"
url = "/rss.xml"

[components.rss]
enabled = true
items = 10

[components.sitemap]
enabled = true

[components.opengraph]
enabled = true
