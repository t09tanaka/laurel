<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="Ghost admin Labs panel showing the Export your content button">
  <title>Ghost admin Labs panel — Export your content</title>
  <desc>Schematic of the Ghost admin Settings - Labs page. The Export your content section shows a button labelled Export and a note that an admin JSON file will be downloaded.</desc>
  <rect width="720" height="420" fill="#fafafa"/>
  <rect x="0" y="0" width="720" height="48" fill="#15171a"/>
  <text x="20" y="30" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="#ffffff" font-weight="600">Ghost Admin</text>
  <text x="120" y="30" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="12" fill="#a8b1bb">Settings &gt; Labs</text>
  <rect x="24" y="72" width="672" height="320" rx="6" fill="#ffffff" stroke="#e0e3e8"/>
  <text x="48" y="104" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" fill="#15171a" font-weight="600">Export your content</text>
  <text x="48" y="132" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" fill="#54666d">Download all of your posts, pages, tags, authors, and settings as a JSON file.</text>
  <text x="48" y="152" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" fill="#54666d">Images and uploaded files are NOT included here.</text>
  <rect x="48" y="180" width="180" height="40" rx="4" fill="#15171a"/>
  <text x="138" y="206" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="#ffffff" font-weight="500" text-anchor="middle">Export</text>
  <text x="48" y="252" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" fill="#15171a" font-weight="600">Export your media</text>
  <text x="48" y="276" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" fill="#54666d">Images, files and media uploaded to your site can be downloaded</text>
  <text x="48" y="294" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" fill="#54666d">separately as a ZIP archive.</text>
  <rect x="48" y="318" width="180" height="40" rx="4" fill="#ffffff" stroke="#15171a"/>
  <text x="138" y="344" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="#15171a" font-weight="500" text-anchor="middle">Export media</text>
  <rect x="500" y="180" width="170" height="40" rx="4" fill="none" stroke="#ff5722" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="670" y="174" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" fill="#ff5722" text-anchor="end">Step 1 — JSON export</text>
  <path d="M500 200 L235 200" stroke="#ff5722" stroke-width="2" stroke-dasharray="4 3" fill="none"/>
  <polygon points="240,196 230,200 240,204" fill="#ff5722"/>
</svg>
