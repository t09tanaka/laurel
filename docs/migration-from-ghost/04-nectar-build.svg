<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-label="Terminal showing nectar build producing a dist directory">
  <title>Terminal — nectar build</title>
  <desc>Terminal output from bunx nectar build showing pages generated, assets copied, and the build completing successfully.</desc>
  <rect width="720" height="280" fill="#1d1f21"/>
  <rect x="0" y="0" width="720" height="28" fill="#2b2f33"/>
  <circle cx="16" cy="14" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="14" r="6" fill="#febc2e"/>
  <circle cx="56" cy="14" r="6" fill="#28c840"/>
  <text x="360" y="19" font-family="SF Mono, ui-monospace, Menlo, monospace" font-size="11" fill="#c5c8c6" text-anchor="middle">~/my-blog — bun</text>
  <g font-family="SF Mono, ui-monospace, Menlo, monospace" font-size="13" fill="#c5c8c6">
    <text x="20" y="60"><tspan fill="#81a2be">$</tspan> bunx nectar build</text>
    <text x="20" y="86"><tspan fill="#b5bd68">info</tspan> Loaded nectar.toml (site: My Blog)</text>
    <text x="20" y="106"><tspan fill="#b5bd68">info</tspan> Loaded theme: source v1.4.0</text>
    <text x="20" y="126"><tspan fill="#b5bd68">info</tspan> Rendered 142 posts, 6 pages, 28 tag pages, 3 author pages</text>
    <text x="20" y="146"><tspan fill="#b5bd68">info</tspan> Wrote pagination: 24 pages (6 posts per page)</text>
    <text x="20" y="166"><tspan fill="#b5bd68">info</tspan> Copied 318 asset files, fingerprinted 14 theme assets</text>
    <text x="20" y="186"><tspan fill="#b5bd68">info</tspan> Generated sitemap.xml, rss.xml</text>
    <text x="20" y="206"><tspan fill="#b5bd68">done</tspan> Build complete in 1.8s — dist/</text>
    <text x="20" y="240"><tspan fill="#81a2be">$</tspan> bunx nectar serve</text>
    <text x="20" y="260"><tspan fill="#b5bd68">info</tspan> Serving dist/ on http://localhost:4321</text>
  </g>
</svg>
