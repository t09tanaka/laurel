# Copy this sample to the root of a Laurel site when the complete dist/
# directory is synced to a private Cloudflare R2 bucket and served by a Worker.
name = "laurel-r2-static-site"
main = "worker.ts"
compatibility_date = "2025-04-01"

[[r2_buckets]]
binding = "SITE"
bucket_name = "yoursite-static"
