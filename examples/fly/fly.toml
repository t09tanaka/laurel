# Copy this file, Dockerfile, and nginx.conf to your project root, then run:
#   flyctl launch --no-deploy
#   flyctl deploy --remote-only

app = "my-nectar-site"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
