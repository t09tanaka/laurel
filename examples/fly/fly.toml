# Copy this file and Dockerfile to your project root, enable [deploy.nginx] with
# root = "/usr/share/nginx/html", then run:
#   flyctl launch --no-deploy
#   bunx laurel build
#   flyctl deploy --remote-only

app = "my-laurel-site"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
