# Static-only fallback for Fly deployments that intentionally do not enable
# [deploy.nginx]. The default examples/fly/Dockerfile uses the generated
# dist/.laurel/nginx.conf instead, so redirects.yaml and [deploy.headers] are
# translated into nginx rules. Copy this file to nginx.conf and change the
# Dockerfile back to `COPY nginx.conf /etc/nginx/conf.d/default.conf` only when
# you want this minimal static config.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;

    error_page 404 /404.html;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /404.html {
        internal;
        try_files /404.html =404;
    }

    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /content/images/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri $uri/ $uri/index.html =404;
    }
}
