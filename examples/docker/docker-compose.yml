# Reverse proxy-friendly compose sample for a Laurel site.
# Copy this file, Dockerfile.multi-stage, and nginx.conf to your site root, then
# create the external proxy network once with:
#   docker network create proxy
services:
  laurel:
    build:
      context: .
      dockerfile: Dockerfile.multi-stage
    restart: unless-stopped
    expose:
      - "80"
    ports:
      # Useful for local smoke tests or a host-level Caddy reverse proxy.
      # Remove this when only a containerized proxy should reach the service.
      - "127.0.0.1:8080:80"
    networks:
      - proxy
    labels:
      traefik.enable: "true"
      traefik.http.routers.laurel.rule: "Host(`blog.example.com`)"
      traefik.http.routers.laurel.entrypoints: "websecure"
      traefik.http.routers.laurel.tls: "true"
      traefik.http.services.laurel.loadbalancer.server.port: "80"

      # Caddy container on the same network:
      # blog.example.com {
      #   reverse_proxy laurel:80
      # }

networks:
  proxy:
    external: true
    name: proxy
