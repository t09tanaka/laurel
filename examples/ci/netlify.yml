# Deploy a Nectar site to Netlify.
#
# Copy this file to .github/workflows/netlify.yml in your repo. In Netlify,
# create a site (it can be connected to "no repository" — this workflow is the
# deploy driver), then add these repository secrets:
#   - NETLIFY_AUTH_TOKEN  (personal access token from Netlify user settings)
#   - NETLIFY_SITE_ID     (the API ID of the Netlify site)
#
# Push to main and the workflow uploads dist/ as a production deploy via the
# Netlify CLI. Pull requests deploy as preview URLs.

name: Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: netlify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx nectar build

      - name: Deploy to Netlify
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bunx netlify-cli deploy --dir=dist --prod --message "ci: ${{ github.sha }}"
          else
            bunx netlify-cli deploy --dir=dist --message "preview: ${{ github.sha }}"
          fi
