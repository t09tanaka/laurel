# Deploy a Laurel site to S3 + CloudFront.
#
# Copy this file to .github/workflows/s3-cloudfront.yml in your repo, then set:
#   - secret AWS_ROLE_TO_ASSUME      (IAM role ARN trusting GitHub OIDC)
#   - secret CLOUDFRONT_DISTRIBUTION_ID
#   - variable AWS_REGION            (e.g. us-east-1)
#   - variable S3_BUCKET             (destination bucket name)
#
# OIDC is preferred over long-lived AWS_ACCESS_KEY_ID/SECRET. The IAM role's
# trust policy must accept `token.actions.githubusercontent.com` and restrict
# `sub` to this repo. Give the role permission to list/sync the destination
# bucket and create an invalidation for the CloudFront distribution. See
# docs/deploy/s3-cloudfront.md for the setup checklist.
#
# For directory-style URLs (e.g. /about/ -> /about/index.html), pair this with
# examples/s3-cloudfront/append-index.js as a CloudFront Function.

name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: s3-cloudfront
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx laurel build

      - name: Verify build artifact
        run: |
          test -f dist/.laurel-manifest.json
          test -f dist/.laurel/changed-paths.txt

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Long-cache fingerprinted assets, no-cache HTML so updates ship instantly.
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.txt" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type-by-extension

      - name: Invalidate CloudFront cache
        run: |
          if [ -s dist/.laurel/changed-paths.txt ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
              --paths $(cat dist/.laurel/changed-paths.txt)
          fi
