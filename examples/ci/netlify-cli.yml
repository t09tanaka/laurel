# Deploy a pre-built Laurel site to Netlify with the Netlify CLI.
#
# Copy this file to .github/workflows/netlify.yml in your repo. In Netlify,
# create a site with "no repository" so GitHub Actions is the only deploy
# driver, then add these repository secrets:
#   - NETLIFY_AUTH_TOKEN  (personal access token from Netlify user settings)
#   - NETLIFY_SITE_ID     (the API ID of the Netlify site)
#
# Push to main and this workflow uploads dist/ as a production deploy.
# Pull requests upload preview deploys. Do not also enable Netlify's Git
# integration for the same site, or the same commit can be deployed twice.

name: Deploy to Netlify with CLI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: netlify-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx laurel build

      - name: Deploy production to Netlify
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          bunx netlify-cli deploy
          --dir=dist
          --site="$NETLIFY_SITE_ID"
          --prod
          --message "ci: ${{ github.sha }}"

      - name: Deploy preview to Netlify
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: >
          bunx netlify-cli deploy
          --dir=dist
          --site="$NETLIFY_SITE_ID"
          --message "preview: ${{ github.sha }}"
