# Deploy a Nectar site to Vercel.
#
# Copy this file to .github/workflows/vercel.yml in your repo. Disable Vercel's
# native Git integration for the project so this workflow is the only deploy
# path, then add these repository secrets:
#   - VERCEL_TOKEN     (personal token from Vercel account settings)
#   - VERCEL_ORG_ID    (from .vercel/project.json after `vercel link`)
#   - VERCEL_PROJECT_ID
#
# Push to main = production deploy. Other branches and PRs = preview deploys.
# We build locally (faster cache, full control over Bun version) and use
# `vercel deploy --prebuilt` so Vercel uploads the prebuilt dist/ as-is.

name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: bunx vercel@latest pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build site
        run: bunx nectar build

      - name: Stage prebuilt output for Vercel
        run: |
          mkdir -p .vercel/output/static
          cp -R dist/. .vercel/output/static/
          cat > .vercel/output/config.json <<'JSON'
          { "version": 3 }
          JSON

      - name: Deploy to Vercel
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bunx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            bunx vercel@latest deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi
