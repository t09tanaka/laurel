# Deploy a Nectar site to Fly.io.
#
# Fly is not a static host, so this workflow builds the site and ships it
# inside a tiny static container. You will need a fly.toml and Dockerfile in
# the repo. Minimal Dockerfile example:
#
#   FROM nginx:alpine
#   COPY dist /usr/share/nginx/html
#
# And a matching fly.toml with `[http_service]` pointing at port 80. Then:
#   - run `flyctl launch --no-deploy` once locally to create the app
#   - add secret FLY_API_TOKEN (`flyctl auth token`) to the repo
#
# Push to main and the workflow builds dist/ then runs `flyctl deploy`, which
# bakes dist/ into the image and rolls out a new release.

name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fly
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx nectar build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
