# Deploy a Laurel site to Fly.io.
#
# Fly is not a static host, so this workflow builds the site and ships it
# inside a tiny nginx container. Copy examples/fly/fly.toml and
# examples/fly/Dockerfile to your project, then enable:
#
#   [deploy.nginx]
#   enabled = true
#   root = "/usr/share/nginx/html"
#
# The Fly Dockerfile copies dist/.laurel/nginx.conf into nginx so
# redirects.yaml and [deploy.headers] apply at runtime. See docs/deploy/fly.md
# for the full quickstart. Then:
#   - run `flyctl launch --no-deploy` once locally to create the app
#   - add secret FLY_API_TOKEN (`flyctl auth token`) to the repo
#
# Push to main and the workflow builds dist/ then runs `flyctl deploy`, which
# bakes dist/ into the image and rolls out a new release.

name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fly
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx laurel build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
