# Deploy a Laurel site to Render (Static Site).
#
# Render's first-class flow is "connect a Git repo and let Render build", but
# many teams prefer driving the build from GitHub Actions for consistent Bun
# versions and shared caches. This workflow builds dist/ here, uploads it as
# an artifact, and triggers a Render deploy hook so Render pulls the latest
# commit, rebuilds it, and serves dist/. Required setup:
#
#   - in Render, create a Static Site pointing at this repo with build command
#     `bun install --frozen-lockfile && bunx laurel build` and publish dir `dist`
#   - add BUN_VERSION=1.3.0 to the Render service environment
#   - turn on a Deploy Hook in the Render service settings
#   - add the hook URL as repository secret RENDER_DEPLOY_HOOK_URL
#
# If you would rather have Render skip its own build and just serve our
# artifact, swap to Render's API + signed S3 upload — out of scope for this
# starter.

name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx laurel build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Trigger Render deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call Render deploy hook
        run: |
          curl --fail --silent --show-error -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
