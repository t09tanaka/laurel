# Deploy a Nectar site to Cloudflare Pages.
#
# Copy this file to .github/workflows/cloudflare-pages.yml in your repo. In
# Cloudflare Pages, create a project named in CLOUDFLARE_PROJECT_NAME, then add
# these repository secrets:
#   - CLOUDFLARE_API_TOKEN  (token with "Cloudflare Pages - Edit" permission)
#   - CLOUDFLARE_ACCOUNT_ID
#
# Push to main and Wrangler uploads dist/ as a new Pages deployment. Production
# vs. preview is selected by the branch name automatically.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: my-nectar-site

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bunx nectar build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.ref_name }}
