# Copy this file to the root of a Laurel site repository before importing it
# into Netlify.

[build]
  command = "bunx laurel build"
  publish = "dist"

[build.environment]
  # Laurel requires Bun 1.3 or newer. Netlify installs Bun when BUN_VERSION is
  # present in the build environment.
  BUN_VERSION = "1.3.0"

# Optional: enable Netlify build plugins by uncommenting plugin blocks below.
# Keep Laurel build-time plugins in laurel.toml's top-level `plugins` array.
#
# [[plugins]]
#   package = "@netlify/plugin-lighthouse"
