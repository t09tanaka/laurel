# Copy this sample to the root of a Nectar site that is deployed with
# Cloudflare Workers Static Assets.
name = "nectar-static-assets"
main = "index.ts"
compatibility_date = "2025-04-01"

[assets]
directory = "dist"
not_found_handling = "404-page"
# Optional: exposes the Static Assets handler to the worker as env.ASSETS.
binding = "ASSETS"
# Required so the reference Worker can apply redirects and headers from
# dist/_routes-manifest.json before Cloudflare serves a matching static asset.
run_worker_first = true
