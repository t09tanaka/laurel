[files]
extend-exclude = [
  "example/themes/**",
  "example/dist/**",
  "dist/**",
  "node_modules/**",
  ".worktrees/**",
  "bun.lock",
  "*.lock",
  "CHANGELOG.md",
  "src/cli/dashboard/bundled-assets.ts",
  "tests/fixtures/**",
  ".github/workflows/release.yml",
]
ignore-hidden = false

[default]
extend-ignore-re = [
  "catch-alls",
  "mis-shape",
]

[default.extend-words]
ontext = "ontext"
sodo = "sodo"
Sodo = "Sodo"
unparseable = "unparseable"
