[files]
extend-exclude = [
  "example/themes/**",
  "example/dist/**",
  "dist/**",
  "node_modules/**",
  ".worktrees/**",
  "bun.lock",
  "*.lock",
  "CHANGELOG.md",
  "tests/fixtures/**",
  ".github/workflows/release.yml",
]
ignore-hidden = false

[default.extend-words]
alls = "alls"
mis = "mis"
sodo = "sodo"
Sodo = "Sodo"
unparseable = "unparseable"

[default.extend-identifiers]
ontext = "ontext"
