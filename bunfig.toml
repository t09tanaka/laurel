# Bun configuration. The `[test]` section pins `bun test --coverage` defaults
# so local + CI runs emit consistent reports. Coverage itself stays opt-in
# (`bun test` without `--coverage` runs fast for dev / pre-commit).
#
# Threshold rationale (#665): coverage enforcement lives in
# `scripts/coverage-gate.ts`, which applies the project aggregate floor and
# explicit exclusions for files covered through child-process integration tests.
# Keep bunfig focused on reporter defaults so `bun test --coverage` only emits
# the lcov/text artifacts consumed by the gate.

[test]
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true

# ---------------------------------------------------------------------------
# Supply-chain security scanner (#484, #568).
#
# Bun >= 1.2.x supports running an external "security scanner" before any
# package is downloaded. The scanner is a Bun package that exports a function
# matching the shape documented at:
#   https://bun.sh/docs/install/security-scanner-api
#
# When configured, the scanner is invoked at install time with the set of
# packages bun is about to materialize. It can mark a package as `fatal`
# (install aborts) or `warn` (install continues with a printed advisory). This
# is the layer that catches known-malicious / typosquatted / advisory-flagged
# packages BEFORE they touch node_modules.
#
# Laurel does not ship a scanner of its own; the field below is intentionally
# left commented out so contributors can opt in to an organization-approved
# scanner without forking the repo. Candidates as of 2026-05:
#
#   - "@aikidosec/safe-chain"     community scanner; advisory feed + heuristics
#   - "@socketsecurity/bunfig"    Socket's bun-native scanner (requires API key)
#
# To activate, `bun add -d <scanner>` and uncomment:
#
# [install.security]
# scanner = "@aikidosec/safe-chain"
#
# CI also runs a `bun pm scan` wrapper (see .github/workflows/security.yml)
# which uses whichever scanner is configured here. With no scanner configured,
# Bun exits non-zero, so the wrapper records that exact state as an explicit
# skip while osv-scanner, bun audit, frozen installs, and CodeQL continue to
# provide the baseline supply-chain gate.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Bun fullstack dev server (used by `laurel dashboard --dev`).
#
# bun-plugin-tailwind runs Tailwind v4 against any CSS file referenced from
# an HTML import served via Bun.serve({ routes: { ... } }). The prod bundle
# script (scripts/build-dashboard-bundle.ts) still invokes the standalone
# tailwindcss CLI directly; this plugin only affects the dev server path.
# ---------------------------------------------------------------------------

[serve.static]
plugins = ["bun-plugin-tailwind"]
